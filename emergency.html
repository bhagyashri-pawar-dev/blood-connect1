<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Emergency - Blood Connect</title>

<style>
body {
    font-family: Arial;
    background: #fff0f0;
    margin:0;
}

/* 🔴 Navbar */
.navbar {
    background:#b30000;
    color:white;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo {
    font-size:20px;
    font-weight:bold;
}

.nav-links a {
    color:white;
    margin:0 10px;
    text-decoration:none;
    font-weight:bold;
}

.nav-links a:hover {
    text-decoration: underline;
}

/* 🚨 Title */
h1 {
    color:#b30000;
    margin-top:20px;
    text-align:center;
}

/* 🔍 Search Box */
.container {
    text-align:center;
    margin:20px;
}

select, input {
    padding:10px;
    margin:10px;
    border-radius:6px;
    border:1px solid #ccc;
}

/* 🔘 Buttons */
button {
    padding:12px 20px;
    background:#b30000;
    color:white;
    border:none;
    border-radius:8px;
    margin:5px;
    cursor:pointer;
}

button:hover {
    background:#800000;
}

/* 📋 Cards */
.card {
    background:white;
    margin:15px auto;
    padding:15px;
    width:300px;
    border-radius:10px;
    box-shadow:0 0 8px rgba(0,0,0,0.1);
    text-align:left;
}

.verified {
    color:green;
    font-weight:bold;
}

/* 🔻 Footer */
footer {
    background:#b30000;
    color:white;
    text-align:center;
    padding:10px;
    position:fixed;
    bottom:0;
    width:100%;
}

body {
    margin-bottom:60px;
}
</style>
</head>

<body>

<!-- 🔴 HEADER -->
<div class="navbar">
    <div class="logo">🩸 Blood Connect</div>

    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="search.html">Find Blood</a>
        <a href="dashboard.html">Dashboard</a>
    </div>
</div>

<h1>🚨 Emergency Blood Required</h1>
<p style="text-align:center;">Showing verified & available donors only</p>

<!-- 🔍 SEARCH -->
<div class="container">

    <select id="blood">
        <option value="">Select Blood Group</option>
        <option>A+</option><option>B+</option><option>O+</option><option>AB+</option>
        <option>A-</option><option>B-</option><option>O-</option><option>AB-</option>
    </select>

    <input type="text" id="city" placeholder="Enter City">

    <br>
    <button onclick="findEmergency()">🚨 Find Donors</button>
    <button onclick="goBack()">⬅ Back</button>

</div>

<!-- 📋 RESULTS -->
<div id="results"></div>

<!-- 🔻 FOOTER -->
<footer>
    <p>© 2026 Blood Connect | Save Lives ❤️</p>
</footer>

<script>

// 🔙 Back
function goBack(){
    window.history.back();
}

function findEmergency(){

    let blood = document.getElementById("blood").value.toLowerCase();
    let city = document.getElementById("city").value.toLowerCase();

    let users = JSON.parse(localStorage.getItem("users")) || [];

    // 🔥 ONLY VERIFIED + AVAILABLE
    let results = users.filter(user => 
        user.blood &&
        user.city &&
        user.available === "Yes" &&
        user.status === "Verified" &&
        user.blood.toLowerCase() === blood &&
        user.city.toLowerCase().includes(city)
    );

    let output = "";

    if(results.length === 0){
        output = `
            <h3 style="text-align:center;">🚨 No verified donors available</h3>
        `;
    } else {
        results.slice(0,5).forEach(user => {
            output += `
                <div class="card">
                    <h3>${user.name}</h3>
                    <p>🩸 ${user.blood}</p>
                    <p>📍 ${user.city}</p>
                    <p>📞 ${user.phone}</p>
                    <p class="verified">✔ Verified & Available</p>
                    <p><a href="tel:${user.phone}">📞 Call Now</a></p>
                </div>
            `;
        });
    }

    document.getElementById("results").innerHTML = output;
}

</script>

</body>
</html>
