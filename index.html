<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Blood Connect</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background: #fdf6f6;
    text-align:center;
}

/* Navbar */
.navbar {
    background:#b30000;
    color:white;
    padding:15px;
    font-size:20px;
    font-weight:bold;
}

/* Main Section */
.hero {
    margin-top:80px;
}

.hero h1 {
    color:#b30000;
    font-size:40px;
}

.hero p {
    font-size:18px;
    color:#555;
}

/* Buttons */
.btn {
    display:inline-block;
    margin:15px;
    padding:12px 25px;
    background:#b30000;
    color:white;
    text-decoration:none;
    border-radius:8px;
    font-size:16px;
}

.btn:hover {
    background:#800000;
}
</style>

</head>

<body>

<div class="navbar">
    🩸 Blood Connect
</div>

<div class="hero">
    <h1>Save Lives ❤️</h1>
    <p>Find blood donors near you quickly and easily</p>

    <a href="register.html" class="btn">Become a Donor</a>
    <a href="search.html" class="btn">Find Blood</a>
</div>

</body>
</html>
