<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard - Blood Connect</title>

<style>
body {
    font-family: Arial;
    background: #fdf6f6;
    margin:0;
}

/* Navbar */
.navbar {
    background:#b30000;
    color:white;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo {
    font-size:20px;
    font-weight:bold;
}

.nav-right {
    display:flex;
    align-items:center;
}

.nav-btn {
    background:white;
    color:#b30000;
    padding:6px 12px;
    border-radius:6px;
    border:none;
    margin-right:5px;
    cursor:pointer;
    text-decoration:none;
    font-weight:bold;
}

.nav-btn:hover {
    background:#eee;
}

.logout-btn {
    background:black;
    color:white;
    padding:6px 12px;
    border-radius:6px;
    border:none;
    cursor:pointer;
}

.logout-btn:hover {
    background:#333;
}

/* Cards */
.container {
    display:flex;
    justify-content:space-around;
    margin:20px;
    flex-wrap:wrap;
}

.card {
    background:white;
    padding:20px;
    margin:10px;
    border-radius:10px;
    width:200px;
    text-align:center;
    box-shadow:0 0 8px rgba(0,0,0,0.1);
}

.card h2 {
    color:#b30000;
}

/* List */
.list {
    margin:20px;
}

.user {
    background:white;
    margin:10px;
    padding:10px;
    border-radius:8px;
}

/* Buttons */
.verify-btn {
    margin-top:5px;
    padding:5px 10px;
    background:green;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

.delete-btn {
    margin-top:5px;
    padding:5px 10px;
    background:red;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

/* 🔥 Next Button */
.next-btn {
    padding:12px 25px;
    background:#b30000;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

.next-btn:hover {
    background:#800000;
}

/* Footer */
footer {
    background:#b30000;
    color:white;
    text-align:center;
    padding:10px;
    position:fixed;
    bottom:0;
    width:100%;
}

body {
    margin-bottom:80px;
}
</style>
</head>

<body>

<div class="navbar">
    <div class="logo">🩸 Blood Connect</div>

    <div class="nav-right">
        <button class="nav-btn" onclick="goBack()">⬅ Back</button>
        <a href="index.html" class="nav-btn">🏠 Home</a>
        <span id="welcome" style="margin:0 10px;"></span>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
</div>

<!-- Stats -->
<div class="container">
    <div class="card">
        <h2 id="total">0</h2>
        <p>Total Donors</p>
    </div>

    <div class="card">
        <h2 id="verified">0</h2>
        <p>Verified</p>
    </div>

    <div class="card">
        <h2 id="notVerified">0</h2>
        <p>Not Verified</p>
    </div>
</div>

<!-- Donor List -->
<div class="list" id="donorList"></div>

<!-- 🔥 NEXT BUTTON -->
<div style="text-align:center; margin:20px;">
    <button onclick="goSearch()" class="next-btn">➡ Next (Find Blood)</button>
</div>

<footer>
    <p>© 2026 Blood Connect | Save Lives ❤️</p>
</footer>

<script>
function goBack(){
    window.history.back();
}

function goSearch(){
    window.location.href = "search.html";
}

function logout(){
    localStorage.removeItem("loggedUser");
    localStorage.removeItem("admin");
    alert("Logged out successfully ✅");
    window.location.href = "login.html";
}

let user = JSON.parse(localStorage.getItem("loggedUser"));
let isAdmin = localStorage.getItem("admin");

if(!user && !isAdmin){
    alert("Please login first ❌");
    window.location.href = "login.html";
}

if(isAdmin){
    document.getElementById("welcome").innerText = "Admin Panel 🔥";
}else{
    document.getElementById("welcome").innerText = "Welcome " + user.name;
}

let users = JSON.parse(localStorage.getItem("users")) || [];

document.getElementById("total").innerText = users.length;

let verified = users.filter(u => u.status === "Verified").length;
let notVerified = users.filter(u => u.status !== "Verified").length;

document.getElementById("verified").innerText = verified;
document.getElementById("notVerified").innerText = notVerified;

function loadUsers(){
    let output = "";

    users.forEach((u, index) => {
        output += `
            <div class="user">
                <b>${u.name}</b> - ${u.blood} - ${u.city}<br>
                📞 ${u.phone}<br>

                ${
                    u.status === "Verified"
                    ? '<span style="color:green;">✔ Verified</span>'
                    : '<span style="color:red;">❌ Not Verified</span>'
                }

                ${
                    isAdmin
                    ? `
                    <br>
                    <button class="verify-btn" onclick="verifyUser(${index})">Verify</button>
                    <button class="delete-btn" onclick="deleteUser(${index})">Delete</button>
                    `
                    : ''
                }
            </div>
        `;
    });

    document.getElementById("donorList").innerHTML = output;
}

loadUsers();

function verifyUser(index){
    users[index].status = "Verified";
    localStorage.setItem("users", JSON.stringify(users));
    location.reload();
}

function deleteUser(index){
    if(confirm("Delete this user?")){
        users.splice(index,1);
        localStorage.setItem("users", JSON.stringify(users));
        location.reload();
    }
}
</script>

</body>
</html>
