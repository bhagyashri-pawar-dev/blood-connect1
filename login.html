<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login - Blood Connect</title>

<style>
body {
    font-family: Arial;
    background: #fff5f5;
    margin:0;
}

/* 🔴 Navbar */
.navbar {
    background:#b30000;
    color:white;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo {
    font-size:20px;
    font-weight:bold;
}

.nav-links a {
    color:white;
    margin:0 10px;
    text-decoration:none;
    font-weight:bold;
}

.nav-links a:hover {
    text-decoration: underline;
}

/* 🧾 Form */
.container {
    width: 320px;
    margin: 60px auto;
    background: white;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

h2 {
    text-align:center;
    color:#b30000;
}

input {
    width:100%;
    padding:10px;
    margin:10px 0;
    border-radius:6px;
    border:1px solid #ccc;
}

button {
    width:100%;
    padding:12px;
    background:#b30000;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

button:hover {
    background:#800000;
}

/* 🔙 Back Button */
.back-btn {
    margin-top:10px;
    background:#555;
}

.back-btn:hover {
    background:#333;
}

/* 🔻 Footer */
footer {
    background:#b30000;
    color:white;
    text-align:center;
    padding:10px;
    position:fixed;
    bottom:0;
    width:100%;
}

body {
    margin-bottom:60px;
}
</style>
</head>

<body>

<!-- 🔴 HEADER -->
<div class="navbar">
    <div class="logo">🩸 Blood Connect</div>

    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="register.html">Register</a>
        <a href="login.html">Login</a>
        <a href="search.html">Find Blood</a>
        <a href="emergency.html">Emergency</a>
        <a href="about.html">About</a>
    </div>
</div>

<!-- 🧾 LOGIN FORM -->
<div class="container">
    <h2>Login</h2>

    <form onsubmit="loginUser(event)">
        <input type="text" id="phone" placeholder="Enter Phone Number" required>
        <input type="password" id="password" placeholder="Enter Password" required>

        <button type="submit">Login</button>

    </form>
</div>

<!-- 🔻 FOOTER -->
<footer>
    <p>© 2026 Blood Connect | Save Lives ❤️</p>
</footer>

<script>
function goBack(){
    window.history.back(); // 🔥 previous page la jato
}

function loginUser(e){
    e.preventDefault();

    let phone = document.getElementById("phone").value.trim();
    let password = document.getElementById("password").value.trim();

    // admin login
    if(phone === "9999999999" && password === "admin123"){
        localStorage.setItem("admin", "true");
        alert("Admin Login Successful 🔥");
        window.location.href = "dashboard.html";
        return;
    }

    let users = JSON.parse(localStorage.getItem("users")) || [];

    let foundUser = users.find(user => 
        String(user.phone) === phone && user.password === password
    );

    if(foundUser){
        alert("Login Successful ✅");
        localStorage.setItem("loggedUser", JSON.stringify(foundUser));
        window.location.href = "dashboard.html";
    } else {
        alert("Wrong Phone or Password ❌");
    }
}
</script>

</body>
</html>
